<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      font-family: 'Share Tech Mono', monospace;
      color: #e6edf3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      width: 360px;
      padding: 36px 30px;
      text-align: center;
    }

    h2 {
      font-size: 22px;
      color: #58a6ff;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 28px;
    }

    .otp-box {
      font-size: 32px;
      letter-spacing: 10px;
      color: #d29922;
      background: #0d1117;
      border: 1px dashed #30363d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }

    .reveal {
      font-size: 11px;
      color: #484f58;
      text-decoration: underline;
      cursor: pointer;
      display: block;
      margin-bottom: 24px;
    }

    .reveal:hover { color: #8b949e; }

    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      color: #e6edf3;
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      margin-bottom: 12px;
    }

    input:focus { border-color: #58a6ff; }
    input:disabled { opacity: 0.4; }

    button.verify {
      width: 100%;
      padding: 12px;
      background: #58a6ff;
      color: #0d1117;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button.verify:hover { background: #79b8ff; }
    button.verify:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      font-size: 13px;
      min-height: 18px;
    }

    .msg.ok   { color: #3fb950; }
    .msg.err  { color: #f85149; }
    .msg.warn { color: #d29922; }

    .attempts {
      font-size: 11px;
      color: #484f58;
      margin-top: 8px;
    }

    button.reset {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: none;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #8b949e;
      cursor: pointer;
    }

    button.reset:hover { border-color: #58a6ff; color: #58a6ff; }
  </style>
</head>
<body>

<div class="card">
  <h2>OTP Verify</h2>
  <p class="sub">one-time password authentication</p>

  <div class="otp-box" id="otp-display">••••••</div>
  <span class="reveal" id="reveal-btn" onclick="toggleReveal()">show otp</span>

  <input type="text" id="otp-input" maxlength="6" placeholder="_ _ _ _ _ _"
    oninput="this.value=this.value.replace(/\D/g,'').slice(0,6)"
    onkeydown="if(event.key==='Enter') verify()" />

  <button class="verify" id="verify-btn" onclick="verify()">Verify →</button>

  <div class="msg" id="msg"></div>
  <div class="attempts" id="attempts">attempts: 0 / 3</div>

  <button class="reset" onclick="init()">↺ generate new otp</button>
</div>

<script>
  let otp, attempts, revealed, done;

  function init() {
    otp = Math.floor(100000 + Math.random() * 900000).toString();
    attempts = 0; revealed = false; done = false;
    document.getElementById('otp-display').textContent = '••••••';
    document.getElementById('reveal-btn').textContent = 'show otp';
    document.getElementById('reveal-btn').style.display = 'inline';
    document.getElementById('otp-input').value = '';
    document.getElementById('otp-input').disabled = false;
    document.getElementById('verify-btn').disabled = false;
    document.getElementById('msg').textContent = '';
    document.getElementById('msg').className = 'msg';
    document.getElementById('attempts').textContent = 'attempts: 0 / 3';
  }

  function toggleReveal() {
    if (done) return;
    revealed = !revealed;
    document.getElementById('otp-display').textContent = revealed ? otp : '••••••';
    document.getElementById('reveal-btn').textContent = revealed ? 'hide otp' : 'show otp';
  }

  function verify() {
    if (done) return;
    const entered = document.getElementById('otp-input').value.trim();
    if (entered.length !== 6) {
      showMsg('enter a complete 6-digit otp.', 'warn'); return;
    }
    attempts++;
    document.getElementById('attempts').textContent = 'attempts: ' + attempts + ' / 3';
    document.getElementById('otp-input').value = '';

    if (entered === otp) {
      showMsg('✓ access granted — verified!', 'ok');
      document.getElementById('otp-display').textContent = otp;
      document.getElementById('reveal-btn').style.display = 'none';
      document.getElementById('otp-input').disabled = true;
      document.getElementById('verify-btn').disabled = true;
      done = true;
    } else if (attempts >= 3) {
      showMsg('✗ too many attempts. locked.', 'err');
      document.getElementById('otp-input').disabled = true;
      document.getElementById('verify-btn').disabled = true;
      done = true;
    } else {
      showMsg('✗ wrong otp. ' + (3 - attempts) + ' attempt(s) left.', 'err');
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'warn');
  }

  init();
</script>

</body>
</html>
